# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: datastar-py
  version: 1.0.2
  python_min: '3.11'

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/datastar_py-${{ version }}.tar.gz
  sha256: c6f86e2b48c3a5ea08570a4e958267307a5ffc0253c259f054dc3bb6de8a2c0e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - fastapi
    - sanic
    - starlette
    - quart
    - django
tests:
  - python:
      imports:
        - datastar_py
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Helper functions and classes for the Datastar library
  license: MIT
  license_file: LICENSE
  homepage: https://data-star.dev/

extra:
  recipe-maintainers:
    - rxm7706
